name: Daily n8n & packages update

on:
  schedule:
    # Every day at 3:15 UTC (~7:15 PM previous day PST)
    - cron: '15 3 * * *'
  workflow_dispatch:           # Allows manual trigger from GitHub UI

permissions:
  contents: write              # Required to commit & push changes

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # Needed for git operations

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install jq (for JSON parsing)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get latest n8n digest & version
        id: get-latest
        run: |
          # Get manifest digest of :latest
          digest=$(docker manifest inspect docker.n8n.io/n8nio/n8n:latest \
            | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux").digest' \
            || echo "")

          if [ -z "$digest" ]; then
            echo "Failed to get digest"
            exit 1
          fi

          # Try to get actual version tag from Docker Hub tags API
          tags_json=$(curl -s "https://hub.docker.com/v2/repositories/n8nio/n8n/tags?page_size=5")
          latest_tag=$(echo "$tags_json" | jq -r '.results[0].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || echo "latest")

          echo "latest_digest=$digest" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Get current pinned version from Dockerfile
        id: current
        run: |
          current_from=$(grep -i '^FROM docker.n8n.io/n8nio/n8n:' Dockerfile | head -1 | awk '{print $2}' || echo "")
          echo "current_from=$current_from" >> "$GITHUB_OUTPUT"

      - name: Compare and decide if update needed
        id: decide
        run: |
          if [[ "${{ steps.get-latest.outputs.latest_digest }}" != *"${{ steps.current.outputs.current_from }}"* ]]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=${{ steps.get-latest.outputs.latest_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Dockerfile (if needed)
        if: steps.decide.outputs.update_needed == 'true'
        run: |
          new_from="docker.n8n.io/n8nio/n8n:${{ steps.decide.outputs.new_tag }}"

          # Replace FROM line (handles :latest or old version)
          sed -i "s|^FROM docker.n8n.io/n8nio/n8n:.*|FROM $new_from|g" Dockerfile

          # Show diff for logs
          git diff Dockerfile || true

      - name: Commit & push if Dockerfile changed
        if: steps.decide.outputs.update_needed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add Dockerfile
          git commit -m "chore: update n8n base image to ${{ steps.decide.outputs.new_tag }} (daily check)" || echo "No changes to commit"

          git push origin HEAD:main

      - name: Notify on failure (optional)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number || 1,  // fallback if no issue
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Daily n8n update check failed!\n\nSee logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })
